<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" width="400" height="250">
  <defs>
    <linearGradient id="bg5" x1="0%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" style="stop-color:#020810"/>
      <stop offset="100%" style="stop-color:#08203A"/>
    </linearGradient>
    <linearGradient id="tower5" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0A2A50"/>
      <stop offset="50%" style="stop-color:#0E3260"/>
      <stop offset="100%" style="stop-color:#0A2A50"/>
    </linearGradient>
  </defs>
  <rect width="400" height="250" fill="url(#bg5)"/>
  <!-- City glow -->
  <ellipse cx="200" cy="250" rx="200" ry="60" fill="#D4AF37" opacity="0.04"/>
  <!-- Background buildings -->
  <rect x="20" y="160" width="35" height="90" fill="#061830" opacity="0.6"/>
  <rect x="60" y="140" width="30" height="110" fill="#050F24" opacity="0.6"/>
  <rect x="310" y="150" width="40" height="100" fill="#061830" opacity="0.6"/>
  <rect x="355" y="130" width="30" height="120" fill="#050F24" opacity="0.6"/>
  <!-- Luxury tower - main -->
  <rect x="155" y="10" width="90" height="220" fill="url(#tower5)" stroke="#D4AF37" stroke-width="0.8" opacity="0.9"/>
  <!-- Gold accent stripes (floors) -->
  <line x1="155" y1="50" x2="245" y2="50" stroke="#D4AF37" stroke-width="0.5" opacity="0.4"/>
  <line x1="155" y1="90" x2="245" y2="90" stroke="#D4AF37" stroke-width="0.5" opacity="0.4"/>
  <line x1="155" y1="130" x2="245" y2="130" stroke="#D4AF37" stroke-width="0.5" opacity="0.4"/>
  <line x1="155" y1="170" x2="245" y2="170" stroke="#D4AF37" stroke-width="0.5" opacity="0.4"/>
  <line x1="155" y1="210" x2="245" y2="210" stroke="#D4AF37" stroke-width="0.5" opacity="0.4"/>
  <!-- Windows -->
  <rect x="165" y="20" width="12" height="22" fill="#D4AF37" opacity="0.7"/>
  <rect x="184" y="20" width="12" height="22" fill="#D4AF37" opacity="0.4"/>
  <rect x="203" y="20" width="12" height="22" fill="#D4AF37" opacity="0.8"/>
  <rect x="222" y="20" width="12" height="22" fill="#D4AF37" opacity="0.5"/>
  <rect x="165" y="58" width="12" height="22" fill="#D4AF37" opacity="0.5"/>
  <rect x="184" y="58" width="12" height="22" fill="#D4AF37" opacity="0.9"/>
  <rect x="203" y="58" width="12" height="22" fill="#D4AF37" opacity="0.3"/>
  <rect x="222" y="58" width="12" height="22" fill="#D4AF37" opacity="0.7"/>
  <rect x="165" y="98" width="12" height="22" fill="#D4AF37" opacity="0.8"/>
  <rect x="184" y="98" width="12" height="22" fill="#D4AF37" opacity="0.5"/>
  <rect x="203" y="98" width="12" height="22" fill="#D4AF37" opacity="1"/>
  <rect x="222" y="98" width="12" height="22" fill="#D4AF37" opacity="0.4"/>
  <rect x="165" y="138" width="12" height="22" fill="#D4AF37" opacity="0.6"/>
  <rect x="184" y="138" width="12" height="22" fill="#D4AF37" opacity="0.8"/>
  <rect x="203" y="138" width="12" height="22" fill="#D4AF37" opacity="0.5"/>
  <rect x="222" y="138" width="12" height="22" fill="#D4AF37" opacity="0.9"/>
  <rect x="165" y="178" width="12" height="22" fill="#D4AF37" opacity="0.4"/>
  <rect x="184" y="178" width="12" height="22" fill="#D4AF37" opacity="0.7"/>
  <rect x="203" y="178" width="12" height="22" fill="#D4AF37" opacity="0.6"/>
  <rect x="222" y="178" width="12" height="22" fill="#D4AF37" opacity="0.3"/>
  <!-- Spire -->
  <polygon points="200,0 210,12 190,12" fill="#D4AF37" opacity="0.6"/>
  <!-- Wing buildings -->
  <rect x="110" y="80" width="45" height="150" fill="#0A2845" stroke="#162840" stroke-width="1"/>
  <rect x="245" y="80" width="45" height="150" fill="#0A2845" stroke="#162840" stroke-width="1"/>
  <!-- Ground -->
  <rect x="0" y="228" width="400" height="22" fill="#030C18"/>
  <!-- Reflection -->
  <rect x="155" y="228" width="90" height="10" fill="#D4AF37" opacity="0.05"/>
  <!-- Stars -->
  <circle cx="40" cy="20" r="1.5" fill="#D4AF37" opacity="0.8"/>
  <circle cx="360" cy="15" r="1.5" fill="#D4AF37" opacity="0.6"/>
  <circle cx="100" cy="45" r="1" fill="white" opacity="0.4"/>
  <circle cx="310" cy="30" r="1" fill="white" opacity="0.3"/>
</svg>
