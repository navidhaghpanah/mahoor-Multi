  <circle cx="50" cy="40" r="1.5" fill="#D4AF37" opacity="0.7"/>
  <circle cx="330" cy="25" r="1" fill="#D4AF37" opacity="0.5"/>
  <circle cx="80" cy="20" r="1" fill="white" opacity="0.4"/>
  <circle cx="360" cy="55" r="1.5" fill="white" opacity="0.3"/>
