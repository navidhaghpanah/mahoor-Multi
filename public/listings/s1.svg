  <!-- Windows grid -->
  <rect x="135" y="85" width="25" height="20" fill="#D4AF37" opacity="0.8"/>
  <rect x="170" y="85" width="25" height="20" fill="#D4AF37" opacity="0.5"/>
  <rect x="205" y="85" width="25" height="20" fill="#D4AF37" opacity="0.9"/>
  <rect x="240" y="85" width="25" height="20" fill="#D4AF37" opacity="0.4"/>
  <rect x="135" y="115" width="25" height="20" fill="#D4AF37" opacity="0.6"/>
  <rect x="170" y="115" width="25" height="20" fill="#D4AF37" opacity="0.9"/>
  <rect x="205" y="115" width="25" height="20" fill="#D4AF37" opacity="0.7"/>
  <rect x="240" y="115" width="25" height="20" fill="#D4AF37" opacity="0.3"/>
  <rect x="135" y="145" width="25" height="20" fill="#D4AF37" opacity="0.8"/>
