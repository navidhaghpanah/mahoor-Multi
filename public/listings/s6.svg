<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" width="400" height="250">
  <defs>
    <linearGradient id="sky6" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#030D1E"/>
      <stop offset="60%" style="stop-color:#082035"/>
      <stop offset="100%" style="stop-color:#0A1A10"/>
    </linearGradient>
    <linearGradient id="land6" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0A1E0A"/>
      <stop offset="100%" style="stop-color:#050E05"/>
    </linearGradient>
  </defs>
  <rect width="400" height="250" fill="url(#sky6)"/>
  <!-- Mountains in background -->
  <polygon points="0,160 80,80 160,160" fill="#061018" opacity="0.7"/>
  <polygon points="80,160 180,60 280,160" fill="#040C14" opacity="0.8"/>
  <polygon points="220,160 330,90 400,160" fill="#061018" opacity="0.7"/>
  <!-- Land/ground -->
  <rect x="0" y="155" width="400" height="95" fill="url(#land6)"/>
  <!-- Plot boundary markers (corner posts) -->
  <rect x="60" y="140" width="8" height="40" fill="#D4AF37" opacity="0.7"/>
  <rect x="332" y="140" width="8" height="40" fill="#D4AF37" opacity="0.7"/>
  <rect x="60" y="218" width="8" height="12" fill="#D4AF37" opacity="0.7"/>
  <rect x="332" y="218" width="8" height="12" fill="#D4AF37" opacity="0.7"/>
  <!-- Fence line (plot border) -->
  <line x1="64" y1="148" x2="336" y2="148" stroke="#D4AF37" stroke-width="1.5" stroke-dasharray="8,6" opacity="0.6"/>
  <line x1="64" y1="222" x2="336" y2="222" stroke="#D4AF37" stroke-width="1.5" stroke-dasharray="8,6" opacity="0.6"/>
  <line x1="64" y1="148" x2="64" y2="222" stroke="#D4AF37" stroke-width="1.5" stroke-dasharray="8,6" opacity="0.6"/>
  <line x1="336" y1="148" x2="336" y2="222" stroke="#D4AF37" stroke-width="1.5" stroke-dasharray="8,6" opacity="0.6"/>
  <!-- Land texture - grass patches -->
  <ellipse cx="130" cy="185" rx="20" ry="8" fill="#0D2A0D" opacity="0.6"/>
  <ellipse cx="200" cy="195" rx="25" ry="9" fill="#0D280D" opacity="0.5"/>
  <ellipse cx="280" cy="180" rx="18" ry="7" fill="#0D2A0D" opacity="0.6"/>
  <ellipse cx="160" cy="210" rx="15" ry="6" fill="#0B240B" opacity="0.5"/>
  <ellipse cx="250" cy="210" rx="20" ry="7" fill="#0B240B" opacity="0.4"/>
  <!-- For-sale sign -->
  <rect x="180" y="155" width="40" height="28" rx="3" fill="#D4AF37" opacity="0.85"/>
  <rect x="197" y="183" width="6" height="18" fill="#D4AF37" opacity="0.7"/>
  <text x="200" y="175" font-family="sans-serif" font-size="10" font-weight="bold" text-anchor="middle" fill="#030D1E">زمین</text>
  <!-- Trees at border -->
  <ellipse cx="70" cy="148" rx="18" ry="25" fill="#0A2010" opacity="0.7"/>
  <ellipse cx="330" cy="148" rx="18" ry="25" fill="#0A2010" opacity="0.7"/>
  <!-- Stars -->
  <circle cx="50" cy="30" r="1.5" fill="white" opacity="0.4"/>
  <circle cx="350" cy="25" r="1" fill="#D4AF37" opacity="0.6"/>
  <circle cx="200" cy="20" r="1" fill="white" opacity="0.3"/>
  <circle cx="100" cy="50" r="1" fill="white" opacity="0.3"/>
</svg>
